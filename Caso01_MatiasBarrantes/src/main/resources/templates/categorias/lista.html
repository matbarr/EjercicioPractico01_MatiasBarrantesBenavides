<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Categorias')}"></head>
<body>
<div th:replace="~{fragments/layout :: header}"></div>
<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="section-title m-0">Categorias de entrenamiento</h2>
        <a class="btn btn-gradient" th:href="@{/categorias/nuevo}">Nueva categoria</a>
    </div>

    <div class="table-responsive shadow-sm rounded">
        <table class="table table-hover align-middle m-0">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th class="text-end">Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="categoria : ${categorias}">
                <td th:text="${categoria.id}"></td>
                <td th:text="${categoria.nombre}"></td>
                <td class="text-end">
                    <a class="btn btn-sm btn-outline-primary" th:href="@{/categorias/editar/{id}(id=${categoria.id})}">Editar</a>
                    <a class="btn btn-sm btn-outline-danger" th:href="@{/categorias/eliminar/{id}(id=${categoria.id})}" onclick="return confirm('Desea eliminar esta categoria?');">Eliminar</a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(categorias)}">
                <td colspan="3" class="text-center py-4">No hay categorias registradas.</td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
