<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Formulario de servicio')}"></head>
<body>
<div th:replace="~{fragments/layout :: header}"></div>
<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="container py-5">
    <div class="col-lg-7 mx-auto card p-4 shadow-sm">
        <h2 class="section-title mb-4" th:text="${servicio.id == null} ? 'Nuevo servicio' : 'Editar servicio'"></h2>

        <form th:action="@{/servicios/guardar}" th:object="${servicio}" method="post">
            <input type="hidden" th:field="*{id}">

            <div class="mb-3">
                <label for="nombre" class="form-label">Nombre</label>
                <input id="nombre" type="text" th:field="*{nombre}" class="form-control" placeholder="Ej: Clase de CrossFit">
                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></div>
            </div>

            <div class="mb-3">
                <label for="precio" class="form-label">Precio</label>
                <input id="precio" type="number" step="0.01" min="0" th:field="*{precio}" class="form-control" placeholder="7000.00">
                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('precio')}" th:errors="*{precio}"></div>
            </div>

            <div class="mb-3">
                <label for="categoria" class="form-label">Categoria</label>
                <select id="categoria" th:field="*{categoria.id}" class="form-select">
                    <option value="">Seleccione una categoria</option>
                    <option th:each="categoria : ${categorias}"
                            th:value="${categoria.id}"
                            th:text="${categoria.nombre}"></option>
                </select>
                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('categoria.id')}" th:errors="*{categoria.id}"></div>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-gradient">Guardar</button>
                <a class="btn btn-outline-secondary" th:href="@{/servicios}">Cancelar</a>
            </div>
        </form>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
