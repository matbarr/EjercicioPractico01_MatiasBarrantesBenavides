<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Clases y servicios')}"></head>
<body>
<div th:replace="~{fragments/layout :: header}"></div>
<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="section-title m-0">Clases y servicios</h2>
        <a class="btn btn-gradient" th:href="@{/servicios/nuevo}">Nuevo servicio</a>
    </div>

    <div class="table-responsive shadow-sm rounded">
        <table class="table table-hover align-middle m-0">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Precio</th>
                <th>Categoria</th>
                <th class="text-end">Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="servicio : ${servicios}">
                <td th:text="${servicio.id}"></td>
                <td th:text="${servicio.nombre}"></td>
                <td th:text="${#numbers.formatDecimal(servicio.precio, 1, 'COMMA', 2, 'POINT')}"></td>
                <td th:text="${servicio.categoria.nombre}"></td>
                <td class="text-end">
                    <a class="btn btn-sm btn-outline-primary" th:href="@{/servicios/editar/{id}(id=${servicio.id})}">Editar</a>
                    <a class="btn btn-sm btn-outline-danger" th:href="@{/servicios/eliminar/{id}(id=${servicio.id})}" onclick="return confirm('Desea eliminar este servicio?');">Eliminar</a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(servicios)}">
                <td colspan="5" class="text-center py-4">No hay servicios registrados.</td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
