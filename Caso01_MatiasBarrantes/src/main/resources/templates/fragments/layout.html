<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(titulo)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo}">Gym Fitness</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/site.css}">
</head>
<body>
<header th:fragment="header" class="hero-header">
    <div class="container py-3 d-flex justify-content-between align-items-center">
        <div>
            <h1 class="h4 m-0 brand-title">Gym Fitness Center</h1>
            <p class="text-muted m-0">Entrena con energia y constancia.</p>
        </div>
        <div class="small text-muted d-none d-md-block">Clase destacada: Functional Core Blast</div>
    </div>
</header>

<nav th:fragment="navbar" class="navbar navbar-expand-lg nav-gradient">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">Inicio</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuNav" aria-controls="menuNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="menuNav">
            <ul class="navbar-nav ms-auto gap-2">
                <li class="nav-item"><a class="nav-link" th:href="@{/categorias}">Categorias</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/servicios}">Clases</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/reservas}">Reservas</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/contacto}">Contacto</a></li>
            </ul>
        </div>
    </div>
</nav>

<footer th:fragment="footer" class="footer-theme mt-5">
    <div class="container py-4 text-center">
        <p class="m-0">Gym Fitness Center</p>
    </div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
