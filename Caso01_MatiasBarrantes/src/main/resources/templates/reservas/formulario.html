<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Formulario de reserva')}"></head>
<body>
<div th:replace="~{fragments/layout :: header}"></div>
<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="container py-5">
    <div class="col-lg-7 mx-auto card p-4 shadow-sm">
        <h2 class="section-title mb-4" th:text="${reserva.id == null} ? 'Nueva reserva' : 'Editar reserva'"></h2>

        <form th:action="@{/reservas/guardar}" th:object="${reserva}" method="post">
            <input type="hidden" th:field="*{id}">

            <div class="mb-3">
                <label for="nombreCliente" class="form-label">Nombre del cliente</label>
                <input id="nombreCliente" type="text" th:field="*{nombreCliente}" class="form-control" placeholder="Ej: Ana Rodriguez">
                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('nombreCliente')}" th:errors="*{nombreCliente}"></div>
            </div>

            <div class="mb-3">
                <label for="fecha" class="form-label">Fecha de reserva</label>
                <input id="fecha" type="date" th:field="*{fecha}" class="form-control">
                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('fecha')}" th:errors="*{fecha}"></div>
            </div>

            <div class="mb-3">
                <label for="servicio" class="form-label">Clase o servicio</label>
                <select id="servicio" th:field="*{servicio.id}" class="form-select">
                    <option value="">Seleccione una clase</option>
                    <option th:each="servicio : ${servicios}"
                            th:value="${servicio.id}"
                            th:text="${servicio.nombre}"></option>
                </select>
                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('servicio.id')}" th:errors="*{servicio.id}"></div>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-gradient">Guardar</button>
                <a class="btn btn-outline-secondary" th:href="@{/reservas}">Cancelar</a>
            </div>
        </form>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
